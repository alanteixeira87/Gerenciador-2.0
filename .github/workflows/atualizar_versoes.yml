name: Atualizar Versões dos Apps

# Aqui definimos QUANDO o robô vai rodar
on:
  schedule:
    # Roda todos os dias às 00:00 UTC (21:00 no horário de Brasília)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cria um botão no GitHub para você rodar manualmente quando quiser

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest # O robô vai usar um servidor Linux do próprio GitHub
    
    # Dá permissão para o robô alterar arquivos no seu projeto
    permissions:
      contents: write 

    steps:
      # Passo 1: O robô baixa os arquivos do seu repositório para o servidor dele
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      # Passo 2: O robô instala o Python no servidor
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Passo 3: O robô instala a biblioteca que usamos no código
      - name: Instalar Dependências
        run: pip install google-play-scraper

      # Passo 4: O robô executa o seu script para buscar as versões
      - name: Rodar o Scraper
        run: python scraper.py

 # Passo 5: O robô salva o novo versoes.json e manda de volta pro seu GitHub
      - name: Fazer o Commit e Push das novas versões
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add versoes.json
          git commit -m "🤖 Auto-update: Versões dos apps atualizadas" || echo "Nenhuma mudança nas versões"
          git pull --rebase origin main
          git push